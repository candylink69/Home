<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>CandyLink69 – Categories + Latest</title>

<style>
/* === BASE THEME === */
* {
    box-sizing: border-box;
}
body {
    margin: 0;
    padding-bottom: 70px;
    background: #0b0b0b;
    color: #fff;
    font-family: Arial, sans-serif;
    text-align: center;
}
.container {
    max-width: 1200px;
    margin: auto;
    padding: 8px;
}

/* 🔥 BLINKING TITLE */
.title {
    font-size: 20px;
    font-weight: bold;
    margin: 8px 0 15px 0;
    padding: 12px;
    border-radius: 10px;
    background: rgba(0,0,0,0.7);
    border: 3px solid;
    text-shadow: 0 0 10px currentColor;
    animation: blinkColors 2s infinite alternate, pulseLight 1.5s infinite alternate;
}
@keyframes blinkColors {
    0%   {color:#ff2d55; border-color:#ff2d55; box-shadow:0 0 20px #ff2d55;}
    14%  {color:#ff5500; border-color:#ff5500; box-shadow:0 0 20px #ff5500;}
    28%  {color:#ffaa00; border-color:#ffaa00; box-shadow:0 0 20px #ffaa00;}
    42%  {color:#ffff00; border-color:#ffff00; box-shadow:0 0 20px #ffff00;}
    57%  {color:#00ff88; border-color:#00ff88; box-shadow:0 0 20px #00ff88;}
    71%  {color:#0088ff; border-color:#0088ff; box-shadow:0 0 20px #0088ff;}
    85%  {color:#aa55ff; border-color:#aa55ff; box-shadow:0 0 20px #aa55ff;}
    100% {color:#ff2d55; border-color:#ff2d55; box-shadow:0 0 20px #ff2d55;}
}
@keyframes pulseLight {
    0%   {opacity:0.7;}
    100% {opacity:1;}
}

/* 🔍 SEARCH BAR */
.search-container {
    margin: 15px auto;
    max-width: 700px;
    padding: 0 10px;
    position: relative;
}
.search-box {
    width: 100%;
    padding: 14px 20px;
    font-size: 16px;
    border-radius: 30px;
    border: 2px solid #ff3300;
    background: rgba(255,255,255,0.1);
    color: white;
    outline: none;
    box-sizing: border-box;
    padding-left: 50px;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="%23ff9900" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>');
    background-repeat: no-repeat;
    background-position: 20px center;
}
.search-box::placeholder { color: #aaa; }
.search-box:focus { box-shadow: 0 0 20px rgba(255,51,0,0.7); background-color: rgba(255,255,255,0.15);}
#searchResults {
    position: absolute;
    top: 100%;
    left: 10px;
    right: 10px;
    background: #111;
    border-radius: 10px;
    margin-top: 5px;
    max-height: 400px;
    overflow-y: auto;
    z-index: 1000;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    display: none;
}
.search-result-item { padding: 12px 15px; border-bottom: 1px solid #333; cursor: pointer; text-align: left; transition: background 0.2s; }
.search-result-item:hover { background: rgba(255,51,0,0.1);}
.search-video-id { color: #ff9900; font-weight: bold; font-size: 14px; }
.search-video-title { color: #ccc; font-size: 12px; margin-top: 3px;}
.search-video-cats { color: #888; font-size: 11px; margin-top: 3px;}

/* categories grid */
.categories-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 15px;
    margin: 20px 0;
    padding: 0 10px;
}
.category-card {
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    overflow: hidden;
    border: 2px solid #333;
    transition: all 0.3s ease;
    cursor: pointer;
    position: relative;
}
.category-card:hover { border-color: #ff3300; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(255,51,0,0.3);}
.category-thumb { width: 100%; height: 180px; object-fit: cover; display: block; background: #1a1a1a; }
.category-name { padding: 15px; font-size: 18px; font-weight: bold; color: #ffcc00; background: rgba(0,0,0,0.8);}
.video-count { position: absolute; top: 10px; right: 10px; background: rgba(255,51,0,0.9); color: white; padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold;}

/* trending section */
.section-title {
    text-align: left;
    margin: 30px 15px 15px;
    font-size: 22px;
    color: #ff9900;
    border-bottom: 2px solid #ff3300;
    padding-bottom: 8px;
}
.trending-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin: 0 10px;
}
.trending-item {
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #444;
    cursor: pointer;
}
.trending-thumb { width: 100%; height: 120px; object-fit: cover; display: block; background: #1a1a1a; }
.trending-title { padding: 10px; font-size: 14px; color: #fff; text-align: center;}

/* LATEST VIDEOS */
.latest-grid {
    display: flex;
    flex-direction: column;
    gap: 18px;
    margin: 20px 10px;
}
.latest-video-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
}
.latest-card {
    background: rgba(20,20,20,0.8);
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid #333;
    transition: 0.2s;
    cursor: pointer;
}
.latest-card:hover {
    border-color: #ff6600;
    transform: scale(1.02);
    box-shadow: 0 8px 18px rgba(255,68,0,0.3);
}
.thumb-container {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    border-radius: 10px 10px 0 0;
    background: #111;
}
.thumb-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.2s ease;
}
.preview-video {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    pointer-events: none;
    z-index: 2;
}
.duration {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(0, 0, 0, 0.75);
    color: white;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: bold;
    z-index: 3;
}
.latest-info {
    padding: 12px;
    text-align: left;
}
.latest-id {
    font-weight: bold;
    color: #ffaa44;
    font-size: 15px;
}
.latest-title {
    font-size: 12px;
    color: #ccc;
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.ad-inline {
    background: #000000cc;
    border-radius: 12px;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 8px 0;
}
.ad-inline > div {
    width: 100%;
    max-width: 320px;
    margin: 0 auto;
}
.pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin: 30px 0 20px;
    flex-wrap: wrap;
}
.pagination button {
    background: #ff3300;
    border: none;
    color: white;
    padding: 10px 22px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 40px;
    cursor: pointer;
    transition: 0.2s;
}
.pagination button:disabled {
    background: #555;
    cursor: not-allowed;
    opacity: 0.5;
}
.pagination button:hover:not(:disabled) {
    background: #ff6600;
    transform: scale(1.02);
}
.page-info {
    background: #222;
    padding: 8px 18px;
    border-radius: 40px;
    font-size: 15px;
    color: #ffaa66;
}
.no-videos-msg {
    background: #1e1e1e;
    padding: 40px;
    border-radius: 20px;
    color: #aaa;
    text-align: center;
}
.stats-bar {
    display: flex;
    justify-content: space-around;
    background: rgba(255,51,0,0.1);
    border-radius: 10px;
    padding: 15px;
    margin: 20px 10px;
    flex-wrap: wrap;
}
.stat-item { text-align: center; padding: 10px; }
.stat-number { font-size: 24px; font-weight: bold; color: #ff9900; }
.stat-label { font-size: 12px; color: #aaa; margin-top: 5px; }

#sticky {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: #000;
    z-index: 9999;
    min-height: 50px;
    display: flex;
    justify-content: center;
    align-items: center;
}
@media (max-width: 640px) {
    .latest-video-row {
        grid-template-columns: 1fr;
        gap: 14px;
    }
    .section-title {
        font-size: 20px;
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="title">🔥 CandyLink69 Categories 🔥</div>
    
    <div class="search-container">
        <input type="text" class="search-box" id="searchInput" placeholder="Search videos by ID, title or keywords..." autocomplete="off">
        <div id="searchResults"></div>
    </div>
    
    <div class="stats-bar">
        <div class="stat-item"><div class="stat-number" id="totalVideos">0</div><div class="stat-label">Total Videos</div></div>
        <div class="stat-item"><div class="stat-number" id="totalCategories">0</div><div class="stat-label">Categories</div></div>
        <div class="stat-item"><div class="stat-number" id="trendingVideos">0</div><div class="stat-label">Trending</div></div>
    </div>
    
    <div id="ad-top"></div>
    
    <div class="section-title">🎯 Browse Categories</div>
    <div class="categories-grid" id="categoriesContainer"></div>
    
    <div class="section-title">🔥 Trending Now</div>
    <div class="trending-grid" id="trendingContainer"></div>
    
    <div class="section-title">🆕 Latest Videos <span style="font-size:14px;">(newest additions)</span></div>
    <div id="latestVideosContainer">
        <div class="latest-grid" id="latestDynamicGrid"></div>
        <div class="pagination" id="latestPagination"></div>
    </div>
    
    <div id="ad-bottom"></div>
</div>
<div id="sticky"></div>

<script async src="https://pl28370524.effectivegatecpm.com/3a/d6/0f/3ad60f18f18ad6833a8dd0aadd895e49.js"></script>
<script src="data.js"></script>

<script>
// ========== GLOBAL ==========
let allCategories = [];
let reversedVideos = [];      // newest first
let latestCurrentPage = 0;
const LATEST_PER_PAGE = 10;
const AD_AFTER_EVERY = 5;
const MOBILE_AD_KEY = '28a19f677ddf30c65892eb4af1ddee10';
const AD_WIDTH = 320, AD_HEIGHT = 50;

// Helper: escape HTML
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    }).substring(0, 60);
}

// ========== VIDEO CARD HTML ==========
function generateVideoCard(video) {
    return `
    <div class="latest-card" data-video-id="${video.id}">
        <div class="thumb-container">
            <img class="thumb-img" src="Thumbs/${video.id}.webp" alt="${video.id}" loading="lazy" onerror="this.src='https://via.placeholder.com/320x180?text=No+Thumb'">
            ${video.preview ? `
            <video class="preview-video" muted loop playsinline preload="none" data-src="${video.preview}"></video>
            ` : ''}
            ${video.duration ? `<div class="duration">${video.duration}</div>` : ''}
        </div>
        <div class="latest-info">
            <div class="latest-id">${video.id}</div>
            ${video.title ? `<div class="latest-title">${escapeHtml(video.title)}</div>` : ''}
        </div>
    </div>`;
}

// ========== PREVIEW ON HOVER/TOUCH (only last touched plays) ==========
let currentActivePreview = null; // store the card currently playing preview

function stopPreview() {
    if (currentActivePreview) {
        const container = currentActivePreview.querySelector('.thumb-container');
        const previewVideo = container?.querySelector('.preview-video');
        const thumbImg = container?.querySelector('.thumb-img');
        if (previewVideo) {
            previewVideo.pause();
            previewVideo.style.display = 'none';
        }
        if (thumbImg) thumbImg.style.opacity = '1';
        currentActivePreview = null;
    }
}

function startPreview(card) {
    // stop any currently playing preview
    stopPreview();
    
    const container = card.querySelector('.thumb-container');
    const previewVideo = container?.querySelector('.preview-video');
    const thumbImg = container?.querySelector('.thumb-img');
    if (!previewVideo) return;
    
    // lazy load video source if not already set
    if (!previewVideo.src && previewVideo.dataset.src) {
        previewVideo.src = previewVideo.dataset.src;
        previewVideo.load();
    }
    
    previewVideo.currentTime = 0;
    previewVideo.style.display = 'block';
    previewVideo.play().catch(e => console.log('Preview play failed:', e));
    
    if (thumbImg) thumbImg.style.opacity = '0.3';
    currentActivePreview = card;
}

function setupPreviewHandlers() {
    // Use event delegation to handle dynamically added cards
    const container = document.getElementById('latestDynamicGrid');
    if (!container) return;
    
    // For mouse hover
    container.addEventListener('mouseover', (e) => {
        const card = e.target.closest('.latest-card');
        if (!card) return;
        // On hover, start preview
        startPreview(card);
    });
    
    container.addEventListener('mouseout', (e) => {
        const card = e.target.closest('.latest-card');
        if (card && currentActivePreview === card) {
            stopPreview();
        }
    });
    
    // For touch devices: play on touchstart, stop on touchend
    container.addEventListener('touchstart', (e) => {
        const card = e.target.closest('.latest-card');
        if (!card) return;
        startPreview(card);
        // Do not prevent default to allow scrolling, but stop propagation to avoid conflict
    }, { passive: true });
    
    container.addEventListener('touchend', (e) => {
        const card = e.target.closest('.latest-card');
        if (card && currentActivePreview === card) {
            // small delay to let the video be visible, then stop
            setTimeout(() => {
                if (currentActivePreview === card) stopPreview();
            }, 100);
        }
    });
    
    // Prevent click from triggering preview (click already handled by card navigation)
    // The card's click will open video, which is separate.
}

// ========== RENDER LATEST VIDEOS ==========
function renderLatestPage(page) {
    const container = document.getElementById('latestDynamicGrid');
    if (!container) return;
    if (!reversedVideos.length) {
        container.innerHTML = '<div class="no-videos-msg">✨ No videos available yet.</div>';
        document.getElementById('latestPagination').innerHTML = '';
        return;
    }
    const totalPages = Math.ceil(reversedVideos.length / LATEST_PER_PAGE);
    if (page < 0) page = 0;
    if (page >= totalPages) page = totalPages - 1;
    latestCurrentPage = page;
    const start = page * LATEST_PER_PAGE;
    const pageVideos = reversedVideos.slice(start, start + LATEST_PER_PAGE);
    
    const itemsHtml = [];
    const adSlots = [];
    
    for (let idx = 0; idx < pageVideos.length; idx++) {
        const video = pageVideos[idx];
        itemsHtml.push(generateVideoCard(video));
        
        // insert ad after every AD_AFTER_EVERY videos (not after last)
        if ((idx + 1) % AD_AFTER_EVERY === 0 && idx + 1 < pageVideos.length) {
            const adId = `inline_ad_latest_p${page}_idx${idx}`;
            adSlots.push(adId);
            itemsHtml.push(`
                <div class="ad-inline" id="${adId}">
                    <div style="width:100%; max-width:320px; margin:0 auto;"></div>
                </div>
            `);
        }
    }
    
    const finalHtml = `<div class="latest-video-row">${itemsHtml.join('')}</div>`;
    container.innerHTML = finalHtml;
    
    // load ads
    adSlots.forEach(adId => {
        loadAdIntoElement(adId, MOBILE_AD_KEY, AD_WIDTH, AD_HEIGHT);
    });
    
    // attach click handlers to open video (not preview)
    document.querySelectorAll('.latest-card').forEach(card => {
        const videoId = card.getAttribute('data-video-id');
        if (videoId) {
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                // stop any preview before navigating
                stopPreview();
                goToVideo(videoId);
            });
        }
    });
    
    updatePaginationControls(totalPages, page);
    // re-attach preview handlers? The events are delegated, no need.
}

function updatePaginationControls(totalPages, currentPage) {
    const paginationDiv = document.getElementById('latestPagination');
    if (!paginationDiv) return;
    if (totalPages <= 1) {
        paginationDiv.innerHTML = '';
        return;
    }
    paginationDiv.innerHTML = `
        <button id="prevLatestBtn" ${currentPage === 0 ? 'disabled' : ''}>◀ PREV</button>
        <span class="page-info">Page ${currentPage+1} / ${totalPages}</span>
        <button id="nextLatestBtn" ${currentPage === totalPages-1 ? 'disabled' : ''}>NEXT ▶</button>
    `;
    document.getElementById('prevLatestBtn')?.addEventListener('click', () => {
        if (latestCurrentPage > 0) renderLatestPage(latestCurrentPage - 1);
    });
    document.getElementById('nextLatestBtn')?.addEventListener('click', () => {
        if (latestCurrentPage < totalPages-1) renderLatestPage(latestCurrentPage + 1);
    });
}

// ========== AD LOADER ==========
function loadAdIntoElement(elementId, key, width, height) {
    const containerDiv = document.getElementById(elementId);
    if (!containerDiv) return;
    containerDiv.innerHTML = '<div style="min-height:50px; text-align:center;"></div>';
    delete window.atOptions;
    const s1 = document.createElement('script');
    s1.innerHTML = `
        var atOptions = {
            'key': '${key}',
            'format': 'iframe',
            'height': ${height},
            'width': ${width},
            'params': {}
        };
    `;
    const s2 = document.createElement('script');
    s2.src = 'https://www.highperformanceformat.com/' + key + '/invoke.js?x=' + Math.random();
    s2.async = true;
    containerDiv.appendChild(s1);
    containerDiv.appendChild(s2);
}

// ========== CATEGORIES ==========
async function loadCategories() {
    try {
        const response = await fetch('categories.json');
        allCategories = await response.json();
        if (videos && videos.length) {
            allCategories.forEach(cat => {
                cat.videoCount = videos.filter(v => v.categories && v.categories.includes(cat.id)).length;
            });
        }
        displayCategories(allCategories);
        updateStats(allCategories);
    } catch (error) {
        console.log('No categories.json, generating from videos');
        allCategories = createDefaultCategories();
        displayCategories(allCategories);
        updateStats(allCategories);
    }
}

function createDefaultCategories() {
    const catMap = {};
    if (videos && videos.length) {
        videos.forEach(video => {
            if (video.categories && Array.isArray(video.categories)) {
                video.categories.forEach(catId => {
                    if (!catMap[catId]) {
                        catMap[catId] = { 
                            id: catId, 
                            name: catId.charAt(0).toUpperCase() + catId.slice(1), 
                            thumbnail: `Thumbs/${video.id}.webp`, 
                            videoCount: 0 
                        };
                    }
                });
            }
        });
        Object.keys(catMap).forEach(catId => {
            catMap[catId].videoCount = videos.filter(v => v.categories && v.categories.includes(catId)).length;
        });
        if (Object.keys(catMap).length) return Object.values(catMap);
    }
    return [
        { id: 'indian', name: '🇮🇳 Indian', thumbnail: 'Thumbs/HM001.webp', videoCount: videos?.length || 0 },
        { id: 'foreign', name: '🌍 Foreign', thumbnail: 'Thumbs/Movie001.webp', videoCount: 0 }
    ];
}

function displayCategories(categories) {
    const container = document.getElementById('categoriesContainer');
    container.innerHTML = '';
    categories.forEach(cat => {
                const cnt = videos ? videos.filter(v => v.categories && v.categories.includes(cat.id)).length : 0;
        container.innerHTML += `<div class="category-card" onclick="selectCategory('${cat.id}')">
            <img src="${cat.thumbnail}" alt="${cat.name}" class="category-thumb" loading="lazy" onerror="this.src='https://via.placeholder.com/280x180?text=No+Image'">
            <div class="video-count">${cnt} videos</div>
            <div class="category-name">${cat.name}</div>
        </div>`;
    });
}

function updateStats(categories) {
    document.getElementById('totalVideos').textContent = videos?.length || 0;
    document.getElementById('totalCategories').textContent = categories?.length || 0;
    document.getElementById('trendingVideos').textContent = Math.min(4, videos?.length || 0);
}

// ========== TRENDING ==========
function loadTrendingVideos() {
    const container = document.getElementById('trendingContainer');
    if (!container) return;
    container.innerHTML = '';
    const TRENDING_IDS = ["HM001", "Movie001", "Movie002", "S003"];
    if (!videos) return;
    const trendingVideos = videos.filter(v => TRENDING_IDS.includes(v.id));
    trendingVideos.forEach(video => {
        container.innerHTML += `<div class="trending-item" onclick="goToVideo('${video.id}')">
            <img src="Thumbs/${video.id}.webp" class="trending-thumb" loading="lazy" onerror="this.src='https://via.placeholder.com/200x120?text=No+Thumb'">
            <div class="trending-title">${video.id}</div>
        </div>`;
    });
}

// ========== SEARCH ==========
function setupSearch() {
    const input = document.getElementById('searchInput');
    const resultsDiv = document.getElementById('searchResults');
    input.addEventListener('input', function() {
        const q = this.value.toLowerCase().trim();
        if (q.length < 2) { resultsDiv.style.display = 'none'; return; }
        if (!videos) return;
        const words = q.split(/\s+/).filter(w => w.length > 1);
        const filtered = videos.filter(v => {
            if (v.id.toLowerCase().includes(q)) return true;
            if (v.title && v.title.toLowerCase().includes(q)) return true;
            if (v.categories && v.categories.some(c => c.toLowerCase().includes(q))) return true;
            if (words.length > 1) {
                const text = [v.id, v.title || '', (v.categories || []).join(' ')].join(' ').toLowerCase();
                return words.every(w => text.includes(w));
            }
            return false;
        });
        if (filtered.length === 0) {
            resultsDiv.innerHTML = `<div class="search-no-results" style="padding:15px;">No videos for "${q}"</div>`;
            resultsDiv.style.display = 'block';
            return;
        }
        let html = '';
        filtered.forEach(v => {
            let catNames = '';
            if (v.categories && allCategories.length) {
                catNames = v.categories.map(cid => { 
                    let cat = allCategories.find(c => c.id === cid); 
                    return cat ? cat.name : cid; 
                }).join(', ');
            } else if (v.categories) catNames = v.categories.join(', ');
            html += `<div class="search-result-item" onclick="goToVideo('${v.id}')">
                <div class="search-video-id">${v.id}</div>
                ${v.title ? `<div class="search-video-title">${escapeHtml(v.title)}</div>` : ''}
                <div class="search-video-cats">${catNames || 'uncategorized'}</div>
            </div>`;
        });
        resultsDiv.innerHTML = html;
        resultsDiv.style.display = 'block';
    });
    document.addEventListener('click', function(e) {
        if (!input.contains(e.target) && !resultsDiv.contains(e.target)) resultsDiv.style.display = 'none';
    });
}

// ========== ADS SYSTEM (original) ==========
let refreshCount = 0;
const MAX_REFRESHES = 3;
let lastActivity = Date.now();
let isUserActive = true;

function loadAd(id, key, w, h) {
    let d = document.getElementById(id);
    if(!d) return;
    d.innerHTML = '';
    delete window.atOptions;
    let s1 = document.createElement('script');
    s1.innerHTML = `var atOptions = {'key': '${key}','format': 'iframe','height': ${h},'width': ${w},'params': {}};`;
    let s2 = document.createElement('script');
    s2.src = 'https://www.highperformanceformat.com/' + key + '/invoke.js?x=' + Math.random();
    s2.async = true;
    d.appendChild(s1);
    d.appendChild(s2);
}

function loadAllAds() {
    if(window.innerWidth < 768) {
        loadAd('ad-top', '28a19f677ddf30c65892eb4af1ddee10', 320, 50);
        loadAd('ad-bottom', '1236280d3c879dfd9af37ab923f7cfb3', 300, 250);
        loadAd('sticky', '28a19f677ddf30c65892eb4af1ddee10', 320, 50);
    } else {
        loadAd('ad-top', 'a7f6af07e7b981a82b1a2a982b13ba01', 728, 90);
        loadAd('ad-bottom', 'a7f6af07e7b981a82b1a2a982b13ba01', 728, 90);
        loadAd('sticky', '28a19f677ddf30c65892eb4af1ddee10', 320, 50);
    }
}

function trySmartRefresh() {
    const now = Date.now();
    if(refreshCount >= MAX_REFRESHES || now - lastActivity > 15000 || !isUserActive || document.hidden || Math.random() > 0.2) return;
    setTimeout(() => {
        if(refreshCount < MAX_REFRESHES && Date.now() - lastActivity < 20000 && isUserActive && !document.hidden) {
            loadAllAds();
            refreshCount++;
        }
    }, 2000 + Math.random() * 3000);
}
const activityEvents = ['mousedown', 'mousemove', 'scroll', 'touchstart', 'click', 'keydown'];
activityEvents.forEach(event => {
    document.addEventListener(event, () => { lastActivity = Date.now(); isUserActive = true; trySmartRefresh(); }, { passive: true });
});

// ========== NAVIGATION ==========
function isInstagram() { return /Instagram/i.test(navigator.userAgent); }
function openExternal(url) {
    if (isInstagram()) {
        const cleanUrl = url.replace(/^https?:\/\//, '');
        window.location.href = "intent://" + cleanUrl + "#Intent;scheme=https;action=android.intent.action.VIEW;end";
    } else { window.location.href = url; }
}
function goToVideo(videoId) { openExternal(`https://candylink69.vercel.app/video.html?v=${videoId}`); }
function selectCategory(categoryId) {
    localStorage.setItem('selectedCategory', categoryId);
    openExternal(`https://candylink69.vercel.app/list.html?category=${categoryId}`);
}

// ========== INITIALIZE ==========
document.addEventListener('DOMContentLoaded', function() {
    function checkVideosAndInit() {
        if (typeof videos !== 'undefined' && videos && videos.length) {
            reversedVideos = [...videos].reverse();
            loadCategories();
            loadTrendingVideos();
            setupSearch();
            renderLatestPage(0);
            setupPreviewHandlers();   // setup preview on hover/touch
            loadAllAds();
            setTimeout(() => { if(Date.now() - lastActivity < 30000) trySmartRefresh(); }, 45000);
        } else {
            setTimeout(checkVideosAndInit, 100);
        }
    }
    checkVideosAndInit();
});

// expose globals for onclick
window.selectCategory = selectCategory;
window.goToVideo = goToVideo;
window.openExternal = openExternal;
window.renderLatestPage = renderLatestPage;
window.loadAd = loadAd;
