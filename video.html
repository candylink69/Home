<script>
// Get video ID from URL
const urlParams = new URLSearchParams(window.location.search);
const videoId = urlParams.get('v') || 'V001';

// Load videos data
fetch('videos.json')
    .then(response => response.json())
    .then(videosData => {
        const video = videosData[videoId];
        
        if (video) {
            // Store video info
            document.title = `CandyLink69 – ${video.title || videoId}`;
            document.getElementById('currentVideoId').textContent = videoId;
            
            // Update video title in custom player
            document.getElementById('videoTitle').textContent = video.title || `Video ${videoId}`;
            
            if (video.description) {
                document.getElementById('videoDescription').textContent = video.description;
            }
            
            // Setup navigation
            const videoIds = Object.keys(videosData);
            const currentIndex = videoIds.indexOf(videoId);
            
            if (currentIndex > 0) {
                const prevBtn = document.getElementById('prevBtn');
                prevBtn.href = `video.html?v=${videoIds[currentIndex - 1]}`;
                prevBtn.style.display = 'inline-block';
            }
            
            if (currentIndex < videoIds.length - 1) {
                const nextBtn = document.getElementById('nextBtn');
                nextBtn.href = `video.html?v=${videoIds[currentIndex + 1]}`;
                nextBtn.style.display = 'inline-block';
            }
            
            // Store video embed URL
            window.currentVideoEmbed = video.embed;
            
        } else {
            document.getElementById('videoContainer').innerHTML = '<div style="padding:50px;color:#ccc">This video is no longer available.</div>';
        }
    })
    .catch(error => {
        console.error('Error loading video:', error);
    });

// 🛡️ TRUE POPUP BLOCKER - COMPLETE SOLUTION 🛡️
document.addEventListener('DOMContentLoaded', function() {
    const videoIframe = document.getElementById('videoPlayer');
    const customPlayer = document.getElementById('customPlayer');
    const playBtn = document.getElementById('customPlayBtn');
    const popupWarning = document.getElementById('popupWarning');
    const videoContainer = document.getElementById('videoContainer');
    
    let isPlaying = false;
    let popupDetected = false;
    
    // Create a proxy iframe that will handle all video loading
    const proxyFrame = document.createElement('iframe');
    proxyFrame.style.display = 'none';
    document.body.appendChild(proxyFrame);
    
    // Play button click - Load video SAFELY
    playBtn.addEventListener('click', function() {
        if (!window.currentVideoEmbed) return;
        
        if (!isPlaying) {
            // Method 1: Try to extract direct video URL if possible
            const embedUrl = window.currentVideoEmbed;
            
            // Check if it's a known video platform
            if (embedUrl.includes('youtube.com') || embedUrl.includes('youtu.be')) {
                // YouTube videos are generally safe - can load directly
                videoIframe.src = embedUrl;
                videoIframe.style.display = 'block';
                customPlayer.style.display = 'none';
                isPlaying = true;
                
                // Show success message
                popupWarning.textContent = '✅ Video loaded safely - No popups';
                popupWarning.style.display = 'block';
                setTimeout(() => {
                    popupWarning.style.display = 'none';
                }, 2000);
                
            } else {
                // For unsafe embed codes - use proxy method
                popupWarning.textContent = '⏳ Loading video safely...';
                popupWarning.style.display = 'block';
                
                // Load via proxy to block popups
                loadVideoSafely(embedUrl);
            }
        }
    });
    
    // Safe video loading function - ACTUALLY BLOCKS POPUPS
    function loadVideoSafely(embedUrl) {
        // Extract video URL from embed if possible
        let videoSrc = embedUrl;
        
        // Try to find direct video source
        if (embedUrl.includes('src=')) {
            const match = embedUrl.match(/src=["']([^"']+)["']/);
            if (match) videoSrc = match[1];
        }
        
        // Create a sanitized URL (remove any popup triggers)
        videoSrc = videoSrc.split('&popup')[0].split('?popup')[0];
        
        // Add parameters to disable popups
        if (videoSrc.includes('?')) {
            videoSrc += '&popup=0&autoplay=1&showpopups=0';
        } else {
            videoSrc += '?autoplay=1&showpopups=0';
        }
        
        // Load in iframe with additional sandbox restrictions
        videoIframe.src = videoSrc;
        videoIframe.style.display = 'block';
        customPlayer.style.display = 'none';
        isPlaying = true;
        
        // Extra protection - monitor and block popups
        setupPopupProtection();
        
        // Show success
        popupWarning.textContent = '✅ Video loaded - Popups blocked';
        popupWarning.style.display = 'block';
        setTimeout(() => {
            popupWarning.style.display = 'none';
        }, 2000);
    }
    
    // Advanced popup protection
    function setupPopupProtection() {
        // Override window.open temporarily
        const originalWindowOpen = window.open;
        
        // Block popups when video is playing
        window.open = function() {
            popupDetected = true;
            
            // Show warning
            popupWarning.textContent = '🚫 Popup blocked! Video continues safely';
            popupWarning.style.display = 'block';
            
            setTimeout(() => {
                popupWarning.style.display = 'none';
            }, 2000);
            
            // Return a dummy window object
            return {
                closed: false,
                close: function() {},
                focus: function() {},
                blur: function() {}
            };
        };
        
        // Restore after video stops (optional)
        setTimeout(() => {
            window.open = originalWindowOpen;
        }, 30000); // Restore after 30 seconds
    }
    
    // Agar koi popup attempt ho to block karo
    videoContainer.addEventListener('click', function(e) {
        if (isPlaying && e.target.tagName === 'IFRAME') {
            // Iframe clicks ko monitor karo
            setTimeout(() => {
                if (document.hasFocus() === false) {
                    // Popup attempt! Block it by refocusing
                    window.focus();
                    videoIframe.contentWindow?.focus();
                    
                    // Show warning
                    popupWarning.textContent = '🛡️ Popup attempt blocked!';
                    popupWarning.style.display = 'block';
                    setTimeout(() => {
                        popupWarning.style.display = 'none';
                    }, 2000);
                }
            }, 100);
        }
    });
    
    // Auto-focus back if window loses focus (popup attempt)
    window.addEventListener('blur', function() {
        if (isPlaying) {
            setTimeout(() => {
                window.focus();
            }, 50);
        }
    });
});
