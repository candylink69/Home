<style>
body{
    margin:0;
    padding-bottom:60px;
    background:#0b0b0b;
    color:#fff;
    font-family:Arial,sans-serif;
    text-align:center;
}
.container{
    max-width:900px;
    margin:auto;
    padding:8px;
}

/* 🔥 BLINKING ANIMATED TITLE 🔥 */
.title{
    font-size:20px;
    font-weight:bold;
    margin:8px 0 15px 0;
    padding:12px;
    border-radius:10px;
    background:rgba(0,0,0,0.7);
    border:3px solid;
    text-shadow:0 0 10px currentColor;
    animation:blinkColors 2s infinite alternate, pulseLight 1.5s infinite alternate;
}

@keyframes blinkColors {
    0%   {color:#ff2d55; border-color:#ff2d55; box-shadow:0 0 20px #ff2d55;}
    14%  {color:#ff5500; border-color:#ff5500; box-shadow:0 0 20px #ff5500;}
    28%  {color:#ffaa00; border-color:#ffaa00; box-shadow:0 0 20px #ffaa00;}
    42%  {color:#ffff00; border-color:#ffff00; box-shadow:0 0 20px #ffff00;}
    57%  {color:#00ff88; border-color:#00ff88; box-shadow:0 0 20px #00ff88;}
    71%  {color:#0088ff; border-color:#0088ff; box-shadow:0 0 20px #0088ff;}
    85%  {color:#aa55ff; border-color:#aa55ff; box-shadow:0 0 20px #aa55ff;}
    100% {color:#ff2d55; border-color:#ff2d55; box-shadow:0 0 20px #ff2d55;}
}

@keyframes pulseLight {
    0%   {opacity:0.7;}
    100% {opacity:1;}
}

.banner-space {
    height: 50px;
    margin: 10px 0;
    background: transparent;
}

/* VIDEO CONTAINER WITH OVERLAY */
.video-box{
    position:relative;
    width:100%;
    padding-top:56.25%;
    background:#000;
    margin: 0 0 8px 0;
    cursor: pointer;
}

.video-box iframe{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    border:none;
    pointer-events: none; /* Initially disabled, enabled after 3rd click */
}

/* VIDEO OVERLAY */
.video-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    backdrop-filter: blur(4px);
    transition: background 0.3s;
    border: 2px solid #ff3300;
    box-sizing: border-box;
}

/* PLAY BUTTON */
.play-button {
    width: 70px;
    height: 70px;
    background: #ff3300;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 15px;
    box-shadow: 0 0 30px rgba(255, 51, 0, 0.8);
    animation: pulse 1.5s infinite;
}

.play-button::after {
    content: '▶';
    font-size: 35px;
    color: white;
    margin-left: 5px;
}

@keyframes pulse {
    0% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 51, 0, 0.8); }
    50% { transform: scale(1.1); box-shadow: 0 0 50px rgba(255, 51, 0, 1); }
    100% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 51, 0, 0.8); }
}

/* COUNTER TEXT */
.counter-text {
    font-size: 24px;
    font-weight: bold;
    color: white;
    text-shadow: 0 0 10px #ff3300;
    margin: 10px 0 5px 0;
    background: rgba(0, 0, 0, 0.6);
    padding: 8px 20px;
    border-radius: 50px;
    border: 2px solid #ff3300;
}

.instruction-text {
    font-size: 16px;
    color: #ffaa00;
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* Overlay hidden state */
.video-box.playing .video-overlay {
    display: none;
}

.video-box.playing iframe {
    pointer-events: auto;
}

/* 🔥 ULTRA COMPACT CTA */
.danger-box{
    margin:6px 0;
    padding:4px 6px;
    border-radius:6px;
    background:#140000;
    border:1px solid #ff3300;
    display:inline-flex;
    flex-direction:column;
    align-items:center;
    box-shadow:0 0 12px rgba(255,60,0,.6);
}
.danger-text{
    font-size:13px;
    font-weight:700;
    white-space:nowrap;
    line-height:1.1;
    margin:1px 0;
}
.danger-btn{
    margin-top:3px;
    padding:4px 10px;
    font-size:12px;
    font-weight:bold;
    background:#ff3300;
    color:#fff;
    border-radius:4px;
    text-decoration:none;
}

/* Navigation */
.nav-buttons{
    margin:10px 0;
    display:flex;
    justify-content:center;
    gap:10px;
}
.nav-btn{
    background:#333;
    color:#fff;
    padding:6px 12px;
    border-radius:4px;
    text-decoration:none;
    font-size:12px;
}
.nav-btn:hover{

}

/* STICKY */
#sticky{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#000;
    z-index:9999;
    min-height:50px;
    display:flex;
    justify-content:center;
    align-items:center;

/* Video info */
.video-info{

    color:#ccc;
    text-align:left;
    max-width:800px;
    margin-left:auto;
    margin-right:auto;
}
.video-id{
    color:#ff9900;
    font-weight:bold;
}
</style>

<script>
// ========== VIDEO OVERLAY CONTROLLER ==========
document.addEventListener('DOMContentLoaded', function() {
    const videoContainer = document.getElementById('videoContainer');
    const videoIframe = document.getElementById('videoPlayer');
    const videoOverlay = document.getElementById('videoOverlay');
    const clickCounter = document.getElementById('clickCounter');
    const instruction = document.getElementById('instruction');
    
    let clickCount = 0;
    const maxClicks = 3;
    
    // Messages for each click
    const messages = [
        { counter: '1/3', text: 'Tap again to start video' },
        { counter: '2/3', text: 'One more tap to play' },
        { counter: '3/3', text: 'Starting...' }
    ];
    
    // Function to simulate click on iframe
    function simulateIframeClick() {
        try {
            // Method 1: Dispatch click event at iframe center
            const rect = videoIframe.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            // Create and dispatch click event
            const clickEvent = new MouseEvent('click', {
                view: window,
                bubbles: true,
                cancelable: true,
                clientX: centerX,
                clientY: centerY
            });
            
            // Try to send click to iframe contentDocument if accessible
            try {
                if (videoIframe.contentDocument) {
                    const iframeBody = videoIframe.contentDocument.body;
                    if (iframeBody) {
                        iframeBody.dispatchEvent(clickEvent);
                    }
                }
            } catch (e) {
                // Cross-origin error - fallback to iframe element click
                console.log('Cross-origin iframe, using element click');
            }
            
            // Always click the iframe element itself
            videoIframe.dispatchEvent(clickEvent);
            
            // Also try to focus and send mouse events
            videoIframe.focus();
            
            // Method 2: Create and dispatch mousedown + mouseup (more realistic)
            const mouseDownEvent = new MouseEvent('mousedown', {
                view: window,
                bubbles: true,
                cancelable: true,
                clientX: centerX,
                clientY: centerY
            });
            
            const mouseUpEvent = new MouseEvent('mouseup', {
                view: window,
                bubbles: true,
                cancelable: true,
                clientX: centerX,
                clientY: centerY
            });
            
            videoIframe.dispatchEvent(mouseDownEvent);
            videoIframe.dispatchEvent(mouseUpEvent);
            
        } catch (e) {
            console.log('Click simulation error:', e);
        }
    }
    
    // Overlay click handler
    videoOverlay.addEventListener('click', function(e) {
        e.stopPropagation(); // Prevent event from reaching iframe yet
        
        if (clickCount < maxClicks - 1) {
            // First two clicks: Simulate iframe click, update counter, let popup open
            clickCount++;
            
            // Update UI
            clickCounter.textContent = messages[clickCount - 1].counter;
            instruction.textContent = messages[clickCount - 1].text;
            
            // Simulate click on iframe (popup will open in background)
            simulateIframeClick();
            
            // Visual feedback
            videoOverlay.style.background = 'rgba(0, 0, 0, 0.8)';
            setTimeout(() => {
                videoOverlay.style.background = 'rgba(0, 0, 0, 0.7)';
            }, 200);
            
        } else if (clickCount === maxClicks - 1) {
            // Third click: Remove overlay and enable actual iframe interaction
            clickCount++;
            
            // Update UI one last time
            clickCounter.textContent = '3/3';
            instruction.textContent = 'Starting...';
            
            // Short delay then remove overlay
            setTimeout(() => {
                videoContainer.classList.add('playing');
                
                // Now enable iframe to receive direct clicks
                videoIframe.style.pointerEvents = 'auto';
                
                // Trigger final click on the actual play button area
                simulateIframeClick();
                
                // Optional: Try to find and click video play button inside iframe
                setTimeout(() => {
                    try {
                        if (videoIframe.contentDocument) {
                            const playButton = videoIframe.contentDocument.querySelector('button[aria-label="Play"], .ytp-large-play-button, .vp-play, [class*="play"]');
                            if (playButton) {
                                playButton.click();
                            }
                        }
                    } catch (e) {
                        // Cross-orign, ignore
                    }
                }, 500);
                
            }, 300);
        }
    });
    
    // Handle case where user clicks near edges but overlay still catches
    videoContainer.addEventListener('click', function(e) {
        // If overlay is hidden (playing state), do nothing
        if (videoContainer.classList.contains('playing')) {
            return;
        }
        
        // If click target is overlay, it's already handled
        // If click somehow bypassed overlay, trigger overlay click handler
        if (!e.target.closest('.video-overlay')) {
            // Manually trigger overlay click
            const fakeEvent = { stopPropagation: () => {} };
            videoOverlay.click.call(this, fakeEvent);
        }
    });
    
    // Reset overlay if video src changes (new video loaded)
    const originalSrc = videoIframe.src;
    Object.defineProperty(videoIframe, 'src', {
        set: function(value) {
            this.setAttribute('src', value);
            // Reset overlay
            clickCount = 0;
            clickCounter.textContent = '3';
            instruction.textContent = 'Tap to start';
            videoContainer.classList.remove('playing');
            videoIframe.style.pointerEvents = 'none';
        },
        get: function() {
            return this.getAttribute('src');
        }
    });
});

// ========== EXISTING VIDEO LOADER CODE (unchanged) ==========
const urlParams = new URLSearchParams(window.location.search);
const videoId = urlParams.get('v') || 'V001';

fetch('videos.json')
    .then(response => response.json())
    .then(videosData => {
        const video = videosData[videoId];
        
        if (video) {
            document.title = `CandyLink69 – ${video.title || videoId}`;
            document.getElementById('videoPlayer').src = video.embed;
            document.getElementById('currentVideoId').textContent = videoId;
            
            if (video.description) {
                document.getElementById('videoDescription').textContent = video.description;
            }
            
            const videoIds = Object.keys(videosData);
            const currentIndex = videoIds.indexOf(videoId);
            
            if (currentIndex > 0) {
                const prevBtn = document.getElementById('prevBtn');
                prevBtn.href = `video.html?v=${videoIds[currentIndex - 1]}`;
                prevBtn.style.display = 'inline-block';
            }
            
            if (currentIndex < videoIds.length - 1) {
                const nextBtn = document.getElementById('nextBtn');
                nextBtn.href = `video.html?v=${videoIds[currentIndex + 1]}`;
                nextBtn.style.display = 'inline-block';
            }
            
        } else {
            document.getElementById('videoPlayer').outerHTML = 
                '<div style="padding:50px;color:#ccc">This video is no longer available.</div>';
        }
    })
    .catch(error => {
        console.error('Error loading video:', error);
    });

// ========== AD CODE (unchanged) ==========
let refreshCount = 0;
const MAX_REFRESHES = 3;
let refreshInterval = null;

function loadAd(id,key,w,h){
    let d=document.getElementById(id);
    if(!d) return;
    
    d.innerHTML='';
    delete window.atOptions;

    let s1=document.createElement('script');
    s1.innerHTML=`
    var atOptions={
        'key':'${key}',
        'format':'iframe',
        'height':${h},
        'width':${w},
        'params':{}
    };`;
    let s2=document.createElement('script');
    s2.src='https://www.highperformanceformat.com/'+key+'/invoke.js?x='+Math.random();
    s2.async=true;

    d.appendChild(s1);
    d.appendChild(s2);
}

function refreshTopAndStickyAds(){
    if (refreshCount >= MAX_REFRESHES) {
        if (refreshInterval) {
            clearInterval(refreshInterval);
            refreshInterval = null;
            console.log('✅ Auto refresh stopped after ' + MAX_REFRESHES + ' times');
        }
        return;
    }
    
    console.log('🔄 Refreshing ad-top & sticky #' + (refreshCount + 1) + ' of ' + MAX_REFRESHES);
    
    if(innerWidth<768){
        loadAd('ad-top','28a19f677ddf30c65892eb4af1ddee10',320,50);
        loadAd('sticky','28a19f677ddf30c65892eb4af1ddee10',320,50);
    }else{
        loadAd('ad-top','a7f6af07e7b981a82b1a2a982b13ba01',728,90);
        loadAd('sticky','28a19f677ddf30c65892eb4af1ddee10',320,50);
    }
    
    refreshCount++;
    
    if (refreshCount >= MAX_REFRESHES && refreshInterval) {
        clearInterval(refreshInterval);
        refreshInterval = null;
        console.log('✅ ad-top & sticky auto refresh COMPLETED (3/3)');
    }
}

function loadAllAdsInitially(){
    if(innerWidth<768){
        loadAd('ad-top','28a19f677ddf30c65892eb4af1ddee10',320,50);
        loadAd('ad-bottom','1236280d3c879dfd9af37ab923f7cfb3',300,250);
        loadAd('sticky','28a19f677ddf30c65892eb4af1ddee10',320,50);
    }else{
        loadAd('ad-top','a7f6af07e7b981a82b1a2a982b13ba01',728,90);
        loadAd('ad-bottom','a7f6af07e7b981a82b1a2a982b13ba01',728,90);
        loadAd('sticky','28a19f677ddf30c65892eb4af1ddee10',320,50);
    }
}

document.addEventListener('DOMContentLoaded', function() {
    loadAllAdsInitially();
    
    refreshInterval = setInterval(refreshTopAndStickyAds, 45000);
    
    window.addEventListener('beforeunload', function() {
        if (refreshInterval) {
            clearInterval(refreshInterval);
        }
    });
});

</script>
